server {
    listen 80;
    server_name coinpusher.xhscopy.top;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name coinpusher.xhscopy.top;

    root /var/www/coinpusher/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy no-referrer-when-downgrade;

    ssl_certificate /etc/letsencrypt/live/coinpusher.xhscopy.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coinpusher.xhscopy.top/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
