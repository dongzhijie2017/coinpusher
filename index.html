<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="合规休闲推币机游戏 Web MVP" />
    <meta name="theme-color" content="#132b40" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/coin-pusher-hero.png" />
    <title>全民推币机</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        const hadController = Boolean(navigator.serviceWorker.controller);
        let reloadingForUpdate = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!hadController || reloadingForUpdate || sessionStorage.getItem('coin-pusher-sw-refresh') === 'done') return;
          reloadingForUpdate = true;
          sessionStorage.setItem('coin-pusher-sw-refresh', 'done');
          window.location.reload();
        });
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js', { updateViaCache: 'none' })
            .then((registration) => registration.update().catch(() => {}))
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
